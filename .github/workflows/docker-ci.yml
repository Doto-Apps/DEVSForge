name: Docker CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    name: Validate Compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Prepare env files for compose validation
        run: cp .env.dist .env
      - name: Validate aio release compose
        run: docker compose -f docker-compose.yml config
      - name: Validate islands release compose
        run: docker compose -f docker-compose.dev-go.yml config