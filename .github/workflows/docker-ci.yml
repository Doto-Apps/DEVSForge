name: Docker CI

on:
  push:
    branches: ["main"]

jobs:
  validate:
    name: Validate Compose And Build Images
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare env files for compose validation
        run: cp .env.dist .env

      - name: Validate release compose
        run: docker compose -f docker-compose.yml config

      - name: Build frontend release image
        run: docker build -f ./front/Dockerfile -t devsforge-frontend:ci ./front

      - name: Build backend release image
        run: docker build -f ./back/Dockerfile -t devsforge-backend:ci ./