name: Publish Backend

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - 'back/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Publish devsforge-backend
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/docker-build
        with:
          image_name: devsforge-backend
          context: ./
          dockerfile: ./back/Dockerfile
          target: backend
