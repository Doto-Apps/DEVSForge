name: Go Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "back/**"
      - "simulator/shared/**"
      - ".github/workflows/go-back.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "back/**"
      - "simulator/shared/**"
      - ".github/workflows/go-back.yml"

env:
  # Change in go-simulator.yml too
  GO_VERSION: 1.26.2
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install Task
        uses: go-task/setup-task@v1
      - name: Validate migrations
        working-directory: ./back
        run: task back:test

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ./back

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('back/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - run: go build -v ./back