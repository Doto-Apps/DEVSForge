name: Go Simulator CI

on:
  push:
    branches: ["main"]
    paths:
      - "simulator/**"
      - ".github/workflow/go-simulator.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "simulator/**"
      - ".github/workflow/go-simulator.yml"

env:
  # Change in go-back.yml too
  GO_VERSION: "1.25.4"
  GOLANGCI_LINT_VERSION: v2.11.4

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      coordinator: ${{ steps.filter.outputs.coordinator }}
      runner: ${{ steps.filter.outputs.runner }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            coordinator:
              - 'simulator/coordinator/**'
              - 'simulator/shared/**'
              - 'simulator/Dockerfile'
              - '.github/workflow/go-simulator.yml'
            runner:
              - 'simulator/runner/**'
              - 'simulator/shared/**'
              - 'simulator/Dockerfile'
              - '.github/workflow/go-simulator.yml'
            shared:
              - 'simulator/shared/**'
              - '.github/workflow/go-simulator.yml'

  lint-coordinator:
    needs: changes
    if: needs.changes.outputs.coordinator == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ./simulator/coordinator

  lint-runner:
    needs: changes
    if: needs.changes.outputs.runner == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ./simulator/runner

  lint-shared:
    needs: changes
    if: needs.changes.outputs.shared == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ./simulator/shared

  build-sim:
    name: Build Simulator
    needs: [lint-coordinator, lint-runner]
    if: |
      always() && (
        needs.lint-coordinator.result == 'success' ||
        needs.lint-runner.result == 'success' ||
        needs.lint-coordinator.result == 'skipped' ||
        needs.lint-runner.result == 'skipped'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('simulator/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - run: go build -v ./simulator/coordinator
      - run: go build -v ./simulator/runner

  test:
    needs: build-sim
    name: Test with Docker Runner
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('simulator/**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Runner Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./simulator/Dockerfile
          tags: devsforge-test-runner:latest
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Tests
        # This docker in docker is needed because runner need different languages
        run: |
          docker run --rm \
            --network host \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v ${{ github.workspace }}:/app \
            -w /app \
            devsforge-test-runner:latest \
            go test -v ./simulator/runner/tests/...
