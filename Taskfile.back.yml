version: "3"

tasks:
  migrate:create:
    desc: Create a new migration file
    dir: back
    cmds:
      - go run github.com/golang-migrate/migrate/v4/cmd/migrate@{{.MIGRATE_VERSION}} create -ext sql -dir database/migrations -seq {{.CLI_ARGS}}

  format:
    desc: Format back-end code with go fmt
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}} fmt ./back/... {{.CLI_ARGS}}

  lint:
    desc: Lint back-end code with golangci-lint
    env:
      GOLANGCI_LINT_CACHE: "{{.GOLANGCI_LINT_CACHE}}"
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}} run ./back/... {{.CLI_ARGS}}

  generate-sdk:
    desc: Generate SDK and API types (Swagger + OpenAPI + TypeScript types)
    dir: ./back/
    cmds:
      - go run github.com/swaggo/swag/cmd/swag@v1.16.6 init --parseDependency
      - npx swagger2openapi -o ./docs/openapi.json ./docs/swagger.json
      - npx openapi-typescript ./docs/openapi.json -o ../front/src/api/v1.d.ts

  dev:
    desc: Start with Docker Compose back + simulator
    cmds:
      - docker compose -f docker-compose.dev-go.yml up --build {{.CLI_ARGS}}

  logs:
    desc: Log with Docker Compose
    cmds:
      - docker compose -f docker-compose.dev-go.yml logs -f {{.CLI_ARGS}}

  clean:
    desc: Stop and remove containers and volumes
    cmds:
      - docker compose -f docker-compose.dev-go.yml down -v

  build:
    desc: Build back-end Go module
    dir: back
    cmds:
      - go build -v ./...

  test:
    desc: Test back-end Go module
    dir: back
    cmds:
      - go test -skip "TestGetDevsSympyJSON" ./...
