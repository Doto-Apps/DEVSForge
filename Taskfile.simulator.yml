version: "3"

tasks:
  format:
    desc: Format all simulator modules (coordinator, runner, shared)
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}} fmt ./simulator/coordinator/... ./simulator/runner/... ./simulator/shared/... {{.CLI_ARGS}}

  lint:
    desc: Lint simulator with golangci-lint
    env:
      GOLANGCI_LINT_CACHE: "{{.GOLANGCI_LINT_CACHE}}"
    vars:
      CLI_ARGS: "{{.CLI_ARGS}}"
    cmds:
      - go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@{{.GOLANGCI_VERSION}} run ./simulator/coordinator/... ./simulator/runner/... ./simulator/shared/... {{.CLI_ARGS}}

  build:
    desc: Build all simulator modules
    cmds:
      - task: build:coordinator
      - task: build:runner
      - task: build:shared

  build:coordinator:
    desc: Build simulator coordinator
    dir: simulator/coordinator
    cmds:
      - go build -v ./...

  build:runner:
    desc: Build simulator runner
    dir: simulator/runner
    cmds:
      - go build -v ./...

  build:shared:
    desc: Build simulator shared
    dir: simulator/shared
    cmds:
      - go build -v ./...

  test:sim:
    desc: Run tests inside Docker runner image
    cmds:
      - echo "Building Docker coordinator image..."
      - docker build -f ./simulator/Dockerfile -t devsforge-test-simulator:latest ./
      - echo "Building Docker runner binary..."
      - CGO_ENABLED=0 go build -ldflags="-s -w" -o ./build/devsforge-runner -v ./simulator/runner/main.go
      - chmod 777 ./build/devsforge-runner
      - echo "Running tests in Docker..."
      - |
        docker run --rm -it --network host \
        -e PATHS_RUNNER_CMD=/tmp/devsforge-runner \
        -e LOG_DIR=/tmp/logs \
        -e PATHS_SIM_ROOT=/tmp/simulations \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -v ./build/devsforge-runner:/tmp/devsforge-runner \
        -v ./simulator/wrappers:/opt/devsforge-wrappers \
        -v ./tmp/unit-tests/simulation:/tmp/simulations \
        -v $(pwd):/app \
        -w /app \
        devsforge-test-simulator:latest go test -v ./simulator/coordinator/...

  test:
    desc: Run tests inside Docker runner image
    cmds:
      - echo "Building Docker runner image..."
      - docker build -f ./simulator/runner/Dockerfile -t devsforge-test-runner:latest ./
      - echo "Running tests in Docker..."
      - |
        docker run --rm -it --network host \
        -v /var/run/docker.sock:/var/run/docker.sock \
        -e LOG_DIR=/tmp/sim-logs \
        -v $(pwd):/app \
        -w /app \
        devsforge-test-runner:latest go test -v ./simulator/runner/tests/...
