version: "3"

vars:
  MODULES_DIRS:
    sh: awk '/use \(/,/\)/ { if ($1 ~ /^\./) print $1 }' go.work

tasks:
  tidy:
    desc: Exécute go mod tidy de manière récursive sur tous les modules du workspace.
    cmds:
      - for: { var: MODULES_DIRS }
        cmd: cd {{.ITEM}} && go mod tidy
    silent: true

  ci:
    desc: Lance le build, le lint et les tests (flux complet de CI).
    deps: [build, lint, test]

  build:
    desc: Compile tous les modules du workspace.
    deps: [tidy]
    cmds:
      - for: { var: MODULES_DIRS }
        cmd: cd {{.ITEM}} && go build -v ./...

  lint:
    desc: Lance le linter (golangci-lint) sur le projet.
    deps: [build]
    cmds:
      - golangci-lint run --issues-exit-code 0

  test:
    desc: Lance les tests avec le race detector (pour le simulateur).
    deps: [build]
    cmds:
      - go test -v ./simulator/runner/tests/...

  prod-docker-build:
    desc: Create complete docker image with backend+simulator+runner.
    deps: [tidy]
    cmds:
      - defer: docker image rm devsforge-local-backend-test:latest > /dev/null || true
      - docker build -f ./back/Dockerfile -t devsforge-local-backend-test:latest ./
      - echo "Taille de l'image finale :"
      - docker images devsforge-local-backend-test:latest --format "{{.Size}}"