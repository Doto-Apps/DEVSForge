version: "3"

includes:
  front:
    taskfile: Taskfile.front.yml
  back:
    taskfile: Taskfile.back.yml
  simulator:
    taskfile: Taskfile.simulator.yml

vars:
  LEFTHOOK_VERSION: v2.1.5
  GOLANGCI_VERSION: v2.11.4
  MIGRATE_VERSION: v4.19.1
  GOLANGCI_LINT_CACHE:
    sh: echo "$(pwd)/.cache/golangci-lint/"

tasks:
  default:
    desc: Print all tasks
    aliases:
      - help
    cmds:
      - cmd: task --list
        silent: true

  setup:
    desc: Install all tools required to dev
    cmds:
      - go install github.com/evilmartians/lefthook/v2@{{.LEFTHOOK_VERSION}}
      - lefthook install
      - cd front && pnpm install
      - echo "✅ Project setup."

  format:
    desc: Format all code (front, back, simulator)
    cmds:
      - task: front:format
      - task: back:format
      - task: simulator:format

  lint:
    desc: Lint all code (front, back, simulator)
    cmds:
      - task: front:check
      - task: back:lint
      - task: simulator:lint

  build:
    desc: Build all modules (back, simulator)
    cmds:
      - task: back:build
      - task: simulator:build

  test:
    desc: Run all tests (back + simulator)
    cmds:
      - task: back:test
      - task: simulator:test

  start:prod:
    desc: Start production environment
    cmds:
      - docker compose -f docker-compose.yml up --pull always

  start:
    desc: Start local environment
    cmds:
      - docker compose -f docker-compose.local.yml up --build

  prod-docker-build:
    desc: Test docker image creations for backend and simulator
    cmds:
      - defer: docker image rm devsforge-local-backend-test:latest > /dev/null || true
      - defer: docker image rm devsforge-local-simulator-test:latest > /dev/null || true
      - docker build -f ./back/Dockerfile -t devsforge-local-backend-test:latest ./
      - docker build -f ./simulator/Dockerfile -t devsforge-local-simulator-test:latest ./
