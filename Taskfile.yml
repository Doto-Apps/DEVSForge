version: "3"

vars:
  MODULES_DIRS:
    sh: awk '/use \(/,/\)/ { if ($1 ~ /^\./) print $1 }' go.work
  # Same as in .github folder
  GOLANGCI_VERSION: v2.11.4

tasks:
  tidy:
    desc: Execute tidy on all modules
    cmds:
      - for: { var: MODULES_DIRS }
        cmd: cd {{.ITEM}} && go mod tidy
    silent: true

  ci:
    desc: Launch all task for ci.
    deps: [build, lint, test]

  build:
    desc: Build all modules.
    deps: [tidy]
    cmds:
      - for: { var: MODULES_DIRS }
        cmd: cd {{.ITEM}} && go build -v ./...

  lint:
    desc: Lint all go modules.
    cmds:
      - for: { var: MODULES_DIRS }
        cmd: |
          echo -e "\033[1;34m==================================================\033[0m"
          echo -e "\033[1;34m🔍 Linting moddule : {{.ITEM}}\033[0m"
          echo -e "\033[1;34m==================================================\033[0m"
          docker run -t --rm -v $(pwd):/app -w /app/{{.ITEM}} --name golangci-lint-devsforge \
          --user $(id -u):$(id -g) \
          -v $(go env GOCACHE):/.cache/go-build -e GOCACHE=/.cache/go-build \
          -v $(go env GOMODCACHE):/.cache/mod -e GOMODCACHE=/.cache/mod \
          -v ~/.cache/golangci-lint:/.cache/golangci-lint -e GOLANGCI_LINT_CACHE=/.cache/golangci-lint \
          golangci/golangci-lint:{{.GOLANGCI_VERSION}} golangci-lint run {{.CLI_ARGS}} || true

  test:
    desc: Run tests inside Docker runner image
    deps: [build]
    cmds:
      - echo "Building Docker runner image..."
      - docker build -f ./back/Dockerfile --target runner -t devsforge-test-runner:latest ./
      - echo "Running tests in Docker..."
      - docker run --rm --network host -e LOG_DIR="/tmp" -v /var/run/docker.sock:/var/run/docker.sock -v $(pwd):/app -w /app devsforge-test-runner:latest go test -v ./simulator/runner/tests/...

  prod-docker-build:
    desc: Test docker image creations for backend, simulator, runner and all-in-one.
    deps: [tidy]
    cmds:
      - defer: docker image rm devsforge-local-backend-test:latest > /dev/null || true
      - defer: docker image rm devsforge-local-simulator-test:latest > /dev/null || true
      - defer: docker image rm devsforge-local-runner-test:latest > /dev/null || true
      - defer: docker image rm devsforge-local-aio-test:latest > /dev/null || true
      - docker build -f ./back/Dockerfile --target backend -t devsforge-local-backend-test:latest ./
      - docker build -f ./back/Dockerfile --target simulator -t devsforge-local-simulator-test:latest ./
      - docker build -f ./back/Dockerfile --target runner -t devsforge-local-runner-test:latest ./
      - docker build -f ./back/Dockerfile -t devsforge-local-aio-test:latest ./
