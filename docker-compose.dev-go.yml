services:
  backend:
    image: cosmtrek/air:latest
    env_file:
      - ./.env
    environment:
      - GOMODCACHE=/go/pkg/mod
      - GOCACHE=/root/.cache/go-build
    working_dir: /app/back
    ports:
      - "3000:3000"
    volumes:
      - ./back:/app/back
      - ./go.work:/app/go.work
      - ./go.work.sum:/app/go.work.sum
      - ./simulator:/app/simulator
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
    develop:
      watch:
        - action: sync
          path: ./back
          target: /app/back
        - action: sync
          path: ./simulator/shared
          target: /app/simulator/shared

  runner-builder:
    image: golang:1.26.2
    working_dir: /app
    environment:
      - GOMODCACHE=/go/pkg/mod
      - GOCACHE=/root/.cache/go-build
    volumes:
      - ./go.work:/app/go.work
      - ./go.work.sum:/app/go.work.sum
      - ./simulator:/app/simulator
      - ./back/go.mod:/app/back/go.mod
      - ./tmp/build:/build
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    command: sh -c "CGO_ENABLED=0 go build -ldflags='-s -w' -o /build/devsforge-runner ./simulator/runner"
    develop:
      watch:
        - action: sync+restart
          path: ./simulator/runner
          target: ./simulator/runner/
        - action: sync+restart
          path: ./simulator/shared
          target: ./simulator/shared

  simulator:
    build:
      dockerfile: ./simulator/Dockerfile.dev
    environment:
      - GOMODCACHE=/go/pkg/mod
      - GOCACHE=/root/.cache/go-build
    env_file:
      - ./.env
    working_dir: /app/simulator/coordinator
    ports:
      - "8080:8080"
    volumes:
      - ./back/go.mod:/app/back/go.mod
      - ./go.work:/app/go.work
      - ./go.work.sum:/app/go.work.sum
      - ./simulator:/app/simulator
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
      - ./tmp/logs:/app/sim-logs
      - ./tmp/build/devsforge-runner:/app/devsforge-runner
      - ./simulator/wrappers:/app/wrappers
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_started
    develop:
      watch:
        - action: sync
          path: ./simulator/coordinator
          target: /app/simulator/coordinator

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-devsforge}
      POSTGRES_DB: ${DB_NAME:-devsforge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-test123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_LOG4J_LOGGERS: "kafka=WARN,kafka.controller=WARN,kafka.log.LogCleaner=WARN,state.change.logger=WARN,kafka.producer.async.DefaultEventHandler=WARN"
    ports:
      - "9092:9092"

volumes:
  postgres-db:
  go-mod-cache:
  go-build-cache: