commit-msg:
  scripts:
    "commitlint.sh":
      runner: bash

pre-commit:
  parallel: true
  jobs:
    - name: Format front
      run: pnpm run format:front
      glob: "front/**"
      stage_fixed: true

    - name: Format back
      run: pnpm run format:back
      root: "/back"
      glob: "**/*.go"
      stage_fixed: true

