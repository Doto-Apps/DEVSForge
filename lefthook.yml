commit-msg:
  scripts:
    "commitlint.sh":
      runner: bash

pre-commit:
  parallel: true
  jobs:
    - name: Format front
      run: pnpm run format:front
      glob: "front/**"
      stage_fixed: true

    - name: Format back
      run: pnpm run format:back
      root: "/back"
      glob: "*.go"
      stage_fixed: true

    - name: Format coordinator
      run: pnpm run format:coordinator
      root: "/simulator/coordinator"
      glob: "*.go"
      stage_fixed: true

    - name: Format runner
      run: pnpm run format:runner
      root: "/simulator/runner"
      glob: "*.go"
      stage_fixed: true

    - name: Format shared
      run: pnpm run format:shared
      root: "/simulator/shared"
      glob: "*.go"
      stage_fixed: true